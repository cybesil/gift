{% extends 'base.html' %}
{% load static %}
{% load humanize %}

{% block title %}
<title>Password Reset Complete | Gift Empire</title>
{% endblock %}

{% block content %}
<main class="main">
    <div class="page-header">
        <div class="container d-flex flex-column align-items-center">
            <nav aria-label="breadcrumb" class="breadcrumb-nav">
                <div class="container">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item active" aria-current="page">
                            Success
                        </li>
                    </ol>
                </div>
            </nav>

            <h1>Password Reset Complete</h1>
        </div>
    </div>

    <div class="container reset-password-container">
        <div class="row">
            <div class="col-lg-6 offset-lg-3">
                <div class="feature-box border-top-primary">
                    <div class="feature-box-content text-center">
                        <i class="icon-check display-4 text-success mb-3"></i>
                        <p>
                            Your password has been set. You may now log in with your new password.
                        </p>
                        <a href="{% url 'accounts:account' %}"
                            class="btn btn-md btn-primary mt-3 font-weight-normal text-transform-none">
                            Log In
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main><!-- End .main -->
{% endblock %}
